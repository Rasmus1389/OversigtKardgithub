<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px 80px;
  }

  header { text-align: center; margin-bottom: 56px; }

  .tag {
    display: inline-block;
    background: #2da44e;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  h1 {
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.02em;
  }

  .apps {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 460px;
  }

  .app-row {
    display: flex;
    align-items: center;
    gap: 18px;
    background: rgba(90, 120, 80, 0.2);
    border: 1px solid rgba(90, 120, 80, 0.3);
    border-radius: 14px;
    padding: 16px 20px;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  }

  .app-row:hover {
    background: rgba(90, 120, 80, 0.32);
    border-color: #2da44e;
    box-shadow: 0 4px 16px rgba(90,120,80,0.2);
    transform: translateX(4px);
  }

  .app-row img {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }

  .app-text { flex: 1; }

  .app-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #1a2e22;
    margin-bottom: 2px;
  }

  .app-url {
    font-size: 0.72rem;
    color: #2da44e;
    font-family: monospace;
  }

  .arrow {
    font-size: 1rem;
    color: #90c8a4;
    transition: color 0.2s, transform 0.2s;
  }
  .app-row:hover .arrow { color: #2da44e; transform: translateX(3px); }

  footer {
    margin-top: 64px;
    font-size: 0.7rem;
    color: black;
    letter-spacing: 0.08em;
    cursor: default;
    user-select: none;
    transition: color 0.5s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  footer:hover { color: #888; }
  .runner { opacity: 0.3; transition: opacity 0.5s; }
  footer:hover .runner { opacity: 0.65; }
</style>
